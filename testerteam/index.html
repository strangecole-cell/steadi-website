<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tester Reimbursement — Steadi</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="../assets/logos/steadi-primary-wordmark-full-color-rgb.svg">

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/testerteam.css">
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="../index.html" class="nav__logo" aria-label="Steadi home">
        <img src="../assets/logos/steadi-primary-wordmark-full-color-rgb.svg" alt="Steadi" width="120" height="28">
      </a>
    </div>
  </nav>

  <!-- ========== TESTER REIMBURSEMENT ========== -->
  <main class="tester-form-page">
    <div class="container container--narrow">
      <div class="tester-form-card">
        <h1 class="tester-form__title">Tester Reimbursement</h1>
        <p class="tester-form__subtext">
          Thank you for testing Steadi. If you're an approved tester, submit your Amazon order
          number below and we'll review it. Once approved, your $45 reward will be sent to your
          email through Tremendous.
        </p>

        <form id="tester-form" class="tester-form" novalidate>
          <div class="tester-form__field">
            <label for="full_name">Full name</label>
            <input type="text" id="full_name" name="full_name" autocomplete="name" required maxlength="200">
          </div>

          <div class="tester-form__field">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required maxlength="254">
          </div>

          <div class="tester-form__field">
            <label for="amazon_order_number">Amazon order number</label>
            <input type="text" id="amazon_order_number" name="amazon_order_number" placeholder="111-1111111-1111111" required maxlength="64">
          </div>

          <div class="tester-form__field">
            <label for="tester_code">Universal tester code</label>
            <input type="text" id="tester_code" name="tester_code" required maxlength="100">
          </div>

          <button type="submit" class="btn btn--primary btn--large tester-form__submit">
            <span class="tester-form__submit-label">Submit</span>
          </button>

          <p class="tester-form__message" id="form-message" role="status" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/testerteam.js"></script>
</body>
</html>
